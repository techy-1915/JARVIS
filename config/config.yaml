# JARVIS Main Configuration
# Copy to config/config.local.yaml and override values for your environment

jarvis:
  name: "JARVIS"
  version: "0.1.0"
  debug: false
  log_level: "INFO"

api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

brain:
  provider: "ollama"            # "ollama" | "custom"
  model: "llama3.1:8b"
  base_url: "http://localhost:11434"
  timeout: 120

memory:
  short_term_limit: 50          # Max messages in short-term memory
  long_term_path: "jarvis/data/long_term_memory.json"
  knowledge_path: "jarvis/data/knowledge.db"

security:
  jwt_secret_env: "JARVIS_SECRET_KEY"
  token_expire_seconds: 3600
  require_auth: false           # Set true in production
  sandbox_timeout: 10
  max_input_length: 10000

wake_word:
  phrase: "hey jarvis"
  enabled: false                # Enable for voice mode

output:
  speak_by_default: false
  tts_engine: "auto"            # "pyttsx3" | "gtts" | "auto" | "none"

logging:
  path: "jarvis/logs"
  max_size_mb: 100
  backup_count: 5
