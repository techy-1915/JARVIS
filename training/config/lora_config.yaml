model:
  base_model: "meta-llama/Llama-3.1-8B-Instruct"  # or local path
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  num_epochs: 3
  warmup_steps: 100
  max_seq_length: 2048
  logging_steps: 10
  save_steps: 500
  evaluation_strategy: "steps"
  eval_steps: 500

output:
  adapter_path: "models/lora_adapters"
  checkpoint_dir: "training/checkpoints"
  logs_dir: "training/logs"
